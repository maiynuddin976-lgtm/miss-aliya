<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miss Aliya</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#ffd6e7;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#ff4f8b;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

header img{
width:40px;
height:40px;
border-radius:50%;
}

.chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
display:flex;
margin:8px 0;
align-items:flex-end;
}

.message img{
width:32px;
height:32px;
border-radius:50%;
margin-right:6px;
}

.bubble{
background:white;
padding:10px 12px;
border-radius:15px;
max-width:70%;
font-size:14px;
}

.user{
justify-content:flex-end;
}

.user .bubble{
background:#ffb3cf;
}

.inputArea{
display:flex;
padding:10px;
background:white;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:2px solid #ff4f8b;
outline:none;
}

button{
margin-left:8px;
padding:10px 16px;
border:none;
border-radius:20px;
background:#ff4f8b;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<div>miss aliya</div>
<img src="aliya.png">
</header>

<div class="chat" id="chat"></div>

<div class="inputArea">
<input id="msg" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

const API_KEY="AIzaSyBnHomFrRQum-C7dKxdxuUFx0Jx9fC7enI";

let memory=JSON.parse(localStorage.getItem("aliya_memory"))||[];

const chat=document.getElementById("chat");
const input=document.getElementById("msg");

function saveMemory(){
localStorage.setItem("aliya_memory",JSON.stringify(memory));
}

function addUser(text){

let div=document.createElement("div");
div.className="message user";
div.innerHTML=`<div class="bubble">${text}</div>`;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

}

function addBot(text){

let div=document.createElement("div");
div.className="message";

div.innerHTML=`
<img src="aliya.png">
<div class="bubble">${text}</div>
`;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

}

async function sendMessage(){

let text=input.value.trim();

if(text==="") return;

addUser(text);

memory.push({role:"user",content:text});

input.value="";

addBot("typing...");

try{

let res=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
role:"user",
parts:[
{
text:
"You are Miss Aliya, a sweet friendly girl who chats softly in Hindi/Urdu style like Instagram DM.\nUser: "+text
}
]
}
]
})
}
);

let data=await res.json();

let reply=data.candidates[0].content.parts[0].text;

chat.lastChild.remove();

addBot(reply);

memory.push({role:"aliya",content:reply});

if(memory.length>20){
memory.shift();
}

saveMemory();

}catch(e){

chat.lastChild.remove();

addBot("API error... check key 💔");

}

}

input.addEventListener("keypress",function(e){

if(e.key==="Enter") sendMessage();

});

</script>

</body>
</html>
